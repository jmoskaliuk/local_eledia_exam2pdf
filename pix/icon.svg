  <!-- Folded corner -->
  <polygon points="55,5 70,20 55,20" fill="#ffffff" opacity="0.25"/>
  <!-- Document lines -->
  <rect x="23" y="30" width="34" height="4" rx="2" fill="#ffffff" opacity="0.7"/>
  <rect x="23" y="40" width="28" height="4" rx="2" fill="#ffffff" opacity="0.7"/>
  <rect x="23" y="50" width="22" height="4" rx="2" fill="#ffffff" opacity="0.5"/>
  <!-- Green checkmark badge -->
  <circle cx="72" cy="75" r="18" fill="#1a7a2e"/>
  <polyline points="62,75 70,83 83,65"
            fill="none" stroke="#ffffff" stroke-width="5"
            stroke-linecap="round" stroke-linejoin="round"/>
